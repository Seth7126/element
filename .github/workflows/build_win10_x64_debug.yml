name: Win10 x64 Debug Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-windows-debug:
    name: Build (Windows x64 Debug)
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache Chocolatey (Windows)
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\Temp\chocolatey
        key: windows-choco-${{ hashFiles('.github/workflows/build-windows-debug.yml') }}
        restore-keys: |
          windows-choco-

    - name: Install dependencies (Windows)
      run: |
        choco install cmake ninja pandoc boost-msvc-14.3 -y

    - name: Setup MSVC environment (Windows)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: windows-2022-ccache-debug-${{ github.sha }}
        restore-keys: |
          windows-2022-ccache-debug-

    - name: Configure CMake (Debug, x64)
      run: >-
        cmake -B build -G Ninja
        -DCMAKE_C_COMPILER=cl
        -DCMAKE_CXX_COMPILER=cl
        -DCMAKE_BUILD_TYPE=Debug
        -DELEMENT_ENABLE_ASIO=ON
        -DELEMENT_ENABLE_UPDATER=OFF
        -DELEMENT_BUILD_PLUGINS=ON
        -DELEMENT_BUILD_TESTS=ON
        -DBoost_INCLUDE_DIR="C:/local/boost_1_87_0"
        -DBoost_LIBRARY_DIRS="C:/local/boost_1_87_0/lib64-msvc-14.3"
      env:
        BOOST_ROOT: C:/local/boost_1_87_0

    - name: Build
      run: cmake --build build --config Debug

    - name: Run tests
      run: ctest --test-dir build --output-on-failure

    - name: List build artifacts (debug)
      run: |
        echo "=== Standalone App ==="
        dir /s /b build\element_app_artefacts
        echo "=== Effect Plugin ==="
        dir /s /b build\element_effect_artefacts
        echo "=== Instrument Plugin ==="
        dir /s /b build\element_instrument_artefacts
        echo "=== Root build contents ==="
        dir /b build\*.exe build\*.dll 2>nul
      shell: cmd

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: element-windows-x64-debug
        path: |
          build/element_app_artefacts/**/*.exe
          build/element_app_artefacts/**/*.dll
          build/element_app_artefacts/**/*.pdb
          build/element_effect_artefacts/**/*.clap
          build/element_effect_artefacts/**/*.pdb
          build/element_effect_artefacts/**/VST3/**/*.vst3
          build/element_effect_artefacts/**/VST3/**/*.pdb
          build/element_effect_artefacts/**/LV2/**
          build/element_instrument_artefacts/**/*.clap
          build/element_instrument_artefacts/**/*.pdb
          build/element_instrument_artefacts/**/VST3/**/*.vst3
          build/element_instrument_artefacts/**/VST3/**/*.pdb
          build/element_instrument_artefacts/**/LV2/**
          build/element_effect_vst3_helper.exe
          build/element_instrument_vst3_helper.exe
          build/juce_lv2_helper.exe
        if-no-files-found: warn
